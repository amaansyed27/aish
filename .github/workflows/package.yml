name: package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    name: package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build provider shell
        run: cargo build --release -p aish-provider-shell

      - name: Build desktop app
        run: npm run desktop:build

      - name: Collect provider shell artifact
        shell: bash
        run: |
          mkdir -p dist/provider-shell
          if [ -f target/release/aish.exe ]; then cp target/release/aish.exe dist/provider-shell/aish.exe; fi
          if [ -f target/release/aish ]; then cp target/release/aish dist/provider-shell/aish; fi

      - uses: actions/upload-artifact@v4
        with:
          name: aish-${{ matrix.os }}
          path: |
            dist/provider-shell/**
            apps/desktop/src-tauri/target/release/bundle/**
